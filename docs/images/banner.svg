<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <rect width="900" height="200" rx="12" fill="url(#grid)"/>
  <!-- Fleet / truck icon -->
  <g transform="translate(80, 100)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Truck body -->
    <rect x="-40" y="-15" width="45" height="28" rx="3" fill="rgba(255,255,255,0.1)"/>
    <!-- Truck cab -->
    <path d="M5,-15 L5,13 L25,13 L25,-5 L15,-15 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Windshield -->
    <line x1="15" y1="-15" x2="25" y2="-5"/>
    <!-- Wheels -->
    <circle cx="-28" cy="17" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
    <circle cx="18" cy="17" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)"/>
    <!-- Second truck (smaller, behind) -->
    <g transform="translate(38, -8) scale(0.55)" opacity="0.5">
      <rect x="-40" y="-15" width="45" height="28" rx="3" fill="rgba(255,255,255,0.05)"/>
      <path d="M5,-15 L5,13 L25,13 L25,-5 L15,-15 Z" fill="rgba(255,255,255,0.08)"/>
      <circle cx="-28" cy="17" r="5" fill="rgba(255,255,255,0.08)"/>
      <circle cx="18" cy="17" r="5" fill="rgba(255,255,255,0.08)"/>
    </g>
  </g>
  <!-- Title -->
  <text x="450" y="90" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">WebApp-Flotas</text>
  <!-- Subtitle -->
  <text x="450" y="130" font-family="'Segoe UI', Roboto, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">Fleet incident management application</text>
</svg>
